    </clipPath>
  </defs>

  <!-- Left hemisphere maze corridors -->
  <g clip-path="url(#clip-left)" stroke="#00d4d8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <polyline points="16,30 16,22 24,22 24,30"/>
