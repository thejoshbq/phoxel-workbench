<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" fill="none">
  <title>Phoxel Workbench favicon</title>
  <desc>A glowing isometric voxel cube mark for small sizes.</desc>
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" rx="16" fill="#0d1117"/>

  <polygon points="50,23 74,37 50,51 26,37" fill="#173d47"/>
  <polygon points="26,37 50,51 50,79 26,65" fill="#0d2329"/>
  <polygon points="74,37 50,51 50,79 74,65" fill="#123036"/>

  <path d="M50,23 L74,37 L74,65 L50,79 L26,65 L26,37 Z"
        stroke="#00d4d8" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M50,51 L74,37 M50,51 L26,37 M50,51 L50,79"
        stroke="#00d4d8" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <g filter="url(#glow)">
    <line x1="26" y1="17" x2="50" y2="37" stroke="#2ee9f0" stroke-width="3" stroke-linecap="round"/>
    <line x1="74" y1="17" x2="50" y2="37" stroke="#2ee9f0" stroke-width="3" stroke-linecap="round"/>
  </g>

  <circle cx="50" cy="37" r="6" fill="#2ee9f0" opacity="0.55" filter="url(#glow)"/>
  <circle cx="50" cy="37" r="3.2" fill="#2ee9f0"/>
  <circle cx="50" cy="37" r="1.6" fill="#eafdfe"/>
</svg>
