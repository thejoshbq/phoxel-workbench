<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" fill="none">
  <title>Phoxel Workbench icon</title>
  <desc>An isometric voxel cube with two light beams converging on a glowing cyan focal point.</desc>
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" rx="16" fill="#0d1117"/>

  <polygon points="50,23 74,37 50,51 26,37" fill="#173d47"/>
  <polygon points="26,37 50,51 50,79 26,65" fill="#0d2329"/>
  <polygon points="74,37 50,51 50,79 74,65" fill="#123036"/>

  <path d="M50,23 L74,37 L74,65 L50,79 L26,65 L26,37 Z"
        stroke="#00d4d8" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M50,51 L74,37 M50,51 L26,37 M50,51 L50,79"
        stroke="#00d4d8" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>

  <polygon points="10,6 19,6 50,37" fill="#2ee9f0" opacity="0.14"/>
  <polygon points="81,6 90,6 50,37" fill="#2ee9f0" opacity="0.14"/>
  <g filter="url(#glow)">
    <line x1="14" y1="7" x2="50" y2="37" stroke="#9fefff" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
    <line x1="86" y1="7" x2="50" y2="37" stroke="#9fefff" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
  </g>

  <circle cx="50" cy="37" r="5" fill="#2ee9f0" opacity="0.55" filter="url(#glow)"/>
  <circle cx="50" cy="37" r="2.6" fill="#2ee9f0"/>
  <circle cx="50" cy="37" r="1.3" fill="#eafdfe"/>
</svg>
