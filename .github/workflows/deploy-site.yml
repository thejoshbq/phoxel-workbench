name: Deploy Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: otis-lab-musc/labrynth
          token: ${{ secrets.PHOXEL_WORKBENCH_SITE_TOKEN }}
          path: labrynth-src

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            site/package-lock.json
            labrynth-src/web/package-lock.json

      - name: Install labrynth deps
        run: npm ci
        working-directory: labrynth-src/web

      - name: Build labrynth demo
        run: npm run build:demo
        working-directory: labrynth-src/web
        env:
          VITE_BASE: ./

      - name: Sync demo into site
        run: |
          rm -rf site/public/labrynth-demo
          mkdir -p site/public/labrynth-demo
          cp -r labrynth-src/web/dist/. site/public/labrynth-demo/

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build
        run: npm run build
        working-directory: site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
