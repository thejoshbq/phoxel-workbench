name: Deploy Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      # Pull the latest published, relative-base Labrynth demo and embed it into
      # public/labrynth-demo/ so the site stays in sync with Labrynth deploys.
      # Needs a PAT with actions:read on Otis-Lab-MUSC/labrynth — the default
      # GITHUB_TOKEN cannot read another org's artifacts. Fails the build loudly
      # if the artifact can't be pulled (no stale demo ships unnoticed).
      - name: Sync Labrynth demo (pull latest artifact)
        run: npm run sync-demo
        working-directory: site
        env:
          GH_TOKEN: ${{ secrets.LABRYNTH_DEMO_TOKEN }}

      - name: Build
        run: npm run build
        working-directory: site
        env:
          # Inlined into the public bundle (not a secret) → use a repo variable.
          # Unset is tolerated: the contact form falls back to local success.
          VITE_CONTACT_ENDPOINT: ${{ vars.VITE_CONTACT_ENDPOINT }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
